# Phase A1 因子研究閾值集中管理
# 2026-04-17 新增。對應 P2 建議：將各因子散落的閾值集中，便於 sensitivity analysis。
#
# 使用規則：
# - `src/features/<factor>.py` 和 `src/analysis/ic_analysis.py` 應從此檔讀取預設值
# - 修改此檔後需 pytest 全跑 + `/factor-ic` 重跑驗證

factor_ic:
  bootstrap:
    method: "stationary_block"   # 取代舊 iid bootstrap（P1-新3A）
    n: 1000
    avg_block_len: 3.0
    seed: 42
    alpha: 0.05                  # 95% CI
  permutation:
    n_iterations: 300
    base_seed: 42                # per (iter, period) 獨立 seed（P1-新4）
    method: "shuffle_factor_keep_returns"  # Grinold-Kahn 標準
  dsr:
    # Deflated Sharpe Ratio (Bailey-Lopez de Prado 2014)
    n_trials_default: 5          # Phase A1 有 5 個因子
  effective_n:
    # Cross-sectional independence 校正（P1-新5）
    method: "industry_cluster"   # 若 industry 資料缺則退化 sqrt(n)
    fallback_ratio: 0.5          # effective_n = n * fallback_ratio 當 cluster 不可用
  min_universe_size:
    cross_sectional: 30          # 少於此數 period 跳過 IC 計算
    rank_stability: 50           # foreign_investor_v2 rank_stability 日內 universe 下限（P1-新7）

factor_specific:
  # ⚠️ SPEC-MIRROR sections (R32 note): high_proximity / pead_eps /
  # margin_short_ratio below are NOT read by their modules (modules hard-code
  # these values). They mirror the module constants for documentation; edit
  # BOTH if changing. foreign_investor_v2 / revenue_momentum_v2 ARE yaml-driven
  # (read via module _subsignal_weights() etc. — R31-4 / R32 fix).
  high_proximity:                # SPEC MIRROR — see src/features/high_proximity.py
    rolling_max_days: 252        # 52 週（hypothesis-locked, George & Hwang 2004）
    shift: 1                     # as_of 當日不入 rolling max

  revenue_momentum_v2:
    # 2026-05-11 R32 finding: keys renamed accel_3m3m→accel, pct_24m→percentile
    # to match src/features/revenue_momentum_v2.py::SUBSIGNAL_WEIGHTS so the module's
    # _subsignal_weights() can actually read this section (was a silent config drift —
    # module hardcoded, yaml never read, and keys mismatched so naive wiring would noop).
    #
    # ⚠️ PARTIAL-LIVE SECTION (R33 B2): only `weights` below is yaml-driven
    # (read via _subsignal_weights()). `seasonal_window_months` is SPEC MIRROR — the
    # module hard-codes DEFAULT_SEASONAL_LOOKBACK_MONTHS=24; edit the module if changing.
    # (`yoy_strict_month_matching` removed 2026-05-11: P1-新6 removed the ±45-day
    # tolerance path so the module is always strict — no config knob exists.)
    weights:
      yoy: 0.50
      accel: 0.20
      percentile: 0.15
      seasonal_z: 0.15
    seasonal_window_months: 24       # SPEC MIRROR — module: DEFAULT_SEASONAL_LOOKBACK_MONTHS

  margin_short_ratio:            # SPEC MIRROR — see src/features/margin_short_ratio.py (module hard-codes -0.5/-0.5/iloc[-21])
    ratio_weight: -0.5           # 反向因子（融資高 → 低分）
    change_weight: -0.5
    change_lookback_days: 20     # 融資變化 20 天（module: iloc[-21] ≈ 20 trading days）
    use_trading_day_offset: true # module 用 row-offset iloc[-21]（不是 calendar offset）

  foreign_investor_v2:
    # 2026-05-10 P1-D 修法：剔除 consistency（R26 audit: 78% symbols
    # consistency=0, std 0.094 vs persistence 0.171, 訊雜比差），weight 重分配
    weights:
      foreign_cum_ratio: 0.50    # was 0.40
      persistence: 0.25          # was 0.20
      rank_stability: 0.25       # was 0.20
      consistency: 0.0           # was 0.20 (deprecated)
    foreign_cum_lookback_days: 20
    rank_stability_lookback_days: 60
    rank_stability_top_pct: 0.20
    dedup_method: "last"         # P1-4 修完後；取代 aggfunc='sum'
    # 2026-05-10 P1-C 修法：last20 stale guard
    last20_max_calendar_span_days: 35   # 20 trading days ≈ 28d + 25% slack
    # 2026-05-10 P0-B 修法：cum_ratio 改金額制 (foreign_net × close ÷ market_value)
    cum_ratio_denomination: "dollar"    # was "shares" (= 1/price 量綱錯)

  pead_eps:                      # SPEC MIRROR — module hard-codes (constants in src/utils/constants.py: QUARTERLY_EPS_LAG_DAYS*)
    baseline_quarters: 8         # 過去 8 季 baseline
    lag_days_q4: 90              # P1-1：Q4 年報法定 90 天（hypothesis-locked）
    lag_days_other: 45           # Q1-Q3 45 天（季報）

  # Phase B0-Lite (2026-05-03) — spike-only factors per H_lite_preregistration
  quality_v2_lite:
    # 用既有 single-snapshot fetch_financial_quality；有 lookahead bias warning
    # （詳 src/features/quality_v2.py module docstring）。Spike 階段可接受;
    # full B0 必先重寫 fetch_financial_quality_history (PIT-correct).
    lookahead_bias_acknowledged: true
    roe_clip: [-0.5, 0.5]
    gross_margin_clip: [0.0, 1.0]
    z_clip: 3.0

  low_vol_v2:
    # 252d daily log-return std；shift=1 PIT；反向因子 (-std, 高分=低 vol)。
    # 不是 AQR BAB (BAB 需 beta + leverage to vol target)；是 realized-vol tilt.
    window: 252
    min_history: 200
    direction: -1                # 反向因子（高 std → 低 score）

universe:
  mode: "intersection"           # P1-新1：全因子共用 intersection
  min_universe_size: 50          # panel 至少此數 symbol 才進 intersection
  # follow-up-4 (R5-1): per-panel thresholds so quarterly/monthly panels
  # (~28 rows / symbol over 7Y) are not mass-dropped by the daily-frequency
  # 250-row bar. A pre-Round-4 version had this as a scalar which
  # deep-merged OVER the DEFAULTS dict and silently reinstated 250 for every
  # panel. Keep this as an explicit dict so YAML→Python merge semantics are
  # preserved.
  min_obs_per_symbol:
    default: 250                 # daily-frequency fallback
    ohlcv: 250
    revenue: 24                  # monthly
    market_value: 250
    margin_short: 250
    institutional_v2: 250
    quarterly_eps: 12            # quarterly, ~4*years

forward_return:
  method: "explicit_asof"        # P1-新2：取代 dropna()
  max_gap_days: 5                # 停牌超過此日數 → 該期不計入
  log_gap_stats: true            # 輸出 gap 統計到 logger

phase_a1:
  # Go/No-Go 決策閾值
  go_a2_min_factors: 2           # ≥ 2 個 DSR-adjusted IR > 0.5（扣摩擦仍正）
  go_a2_ir_threshold: 0.5
  borderline_ir_threshold: 0.3
  smart_beta_benchmark: "0050"   # 100% 0050 主 benchmark
  paper_evaluation_deadline: "2026-10-31"
  min_sharpe_diff_vs_0050: 0.3   # factor portfolio 必須勝 0050 Sharpe 差 > 0.3 連 3 月
