system:
  mode: tw_stock_portfolio

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

check_interval: 900
heartbeat_interval: 86400  # 心跳通知間隔（秒），預設每天一次

database:
  path: data/signals.db

default_strategy:
  sma_fast: 20
  sma_slow: 60
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  bb_period: 20
  bb_std: 2
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  adx_period: 14
  volume_ma_period: 20
  volume_breakout_ratio: 1.5

portfolio:
  profile: tw_3m_stable
  enabled: true
  rebalance_frequency: monthly
  rebalance_day: 12
  rebalance_after_close_hour: 14
  top_n: 8
  hold_buffer: 3
  hold_score_floor: 60
  max_position_weight: 0.12
  market_proxy_symbol: "0050"
  history_limit: 320
  monthly_revenue_months: 15
  min_price: 20
  min_avg_turnover: 50000000
  exclude_etf: true
  use_monthly_revenue: true
  use_auto_universe: true
  auto_universe_size: 80
  auto_universe_markets: ["twse", "tpex"]
  auto_universe_exclude_industries: ["ETF", "ETN", "受益證券", "存託憑證", "權證"]
  # size proxy 效能預篩（僅 market_value 不可用時啟用；0=關閉，掃全部 ~2900 支）
  # 以 stock_id 全範圍等距取樣，避免固定漏掉排序尾端股票。
  auto_universe_pre_filter_size: 400
  auto_universe_include_symbols: []
  auto_universe_exclude_symbols: []
  exposure:
    risk_on: 0.96
    caution: 0.70
    risk_off: 0.35
  # 交易成本與換倉門檻
  turnover_cost: 0.0047          # 台股來回成本 ≈ 0.47%
  turnover_score_threshold: 6.0  # 新股 score 需超過被替換股至少 N 分
  # 產業分散
  max_same_industry: 2           # 同產業最多 N 檔
  # 權重模式: equal | score_weighted
  weight_mode: score_weighted
  # 安全閥
  min_eligible_ratio: 0.3        # 至少 30% 分析成功才再平衡
  # 2026-05-11 R30-6 grep-sweep follow-up: institutional_flow 0.10 → 0.0
  # 對齊 active settings.yaml + tw_stock.py default profiles（legacy 因子
  # IC=-0.053 已 fail；外資 v2 IC=-0.008 R28 verdict DROP）.
  score_weights:
    price_momentum: 0.55
    trend_quality: 0.20
    revenue_momentum: 0.25
    institutional_flow: 0.00
    # Phase A2 Step 2 new factors (default 0.0; enable by setting weight > 0)
    high_proximity: 0.0
    pead_eps: 0.0
    margin_short_ratio: 0.0
    revenue_momentum_v2: 0.0
    foreign_investor_v2: 0.0

